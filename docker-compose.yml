services:
  backend:
    build:
      context: ./AgenteAsignacionLienamientos/BackEnd
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      CLASSIFICATION_JSON_PATH: /app/anexo_c_clasificacion.json
      CORS_ORIGINS: "*"
      LLM_PROVIDER: ${LLM_PROVIDER:-github}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://models.inference.ai.azure.com}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1-mini}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-60}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./Front-ESPE
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
